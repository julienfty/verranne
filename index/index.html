
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veranne</title>
    
    <!-- Polices -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet">
    
    <!-- Lien CSS -->
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- 1. Section de l'image de présentation (Sticky) -->
    <div class="reveal-section">
        <div class="reveal-frame">
            <!-- LE LOGO -->
            <div class="cercle-logo-conteneur">
                <div class="reveal-logo">Veranne</div>
            </div>

            <div class="image-container">
                <img src="accueil3.png" alt="Mon image" class="reveal-image">
            </div>
             
            <div class="reveal-overlay"></div>

            <!-- INDICATEUR DÉCOUVRIR -->
            <div class="scroll-down-indicator" data-target="section-boutique">
                <span class="discover-text">découvrir</span>
                <div class="arrow-down">↓</div>
            </div>
        </div>
    </div> <!-- Fin propre de reveal-section -->

    <!-- Le Header fixe du site -->
    <div class="site-header">
        <div class="site-title">Veranne</div>
        <div class="site-profile">Profil</div>
    </div>

    <!-- LE TITRE -->
    <h2 class="boutique-title">Nos Articles</h2>

    <!-- 2. La section boutique -->
    <div id="section-boutique" class="boutique-section">
        <!-- Le conteneur du scroll horizontal -->
        <div class="boutique-carousel">
            
            <!-- Petit container 1 -->
            <a href="../article/article.html" class="boutique-item">
                <div class="item-image-box">
                    <img src="merde1b.jpg" alt="Article 1">
                </div>
                <div class="item-info">
                    <span class="item-name">Nom de l'article</span>
                    <span class="item-price">00,00 €</span>
                </div>
            </a>

            <!-- Petit container 2 -->
            <div class="boutique-item">
                <div class="item-image-box">
                    <img src="article2.jpg" alt="Article 2">
                </div>
                <div class="item-info">
                    <span class="item-name">Nom de l'article</span>
                    <span class="item-price">00,00 €</span>
                </div>
            </div>

            <!-- Petit container 3 -->
            <div class="boutique-item">
                <div class="item-image-box">
                    <img src="article3.jpg" alt="Article 3">
                </div>
                <div class="item-info">
                    <span class="item-name">Nom de l'article</span>
                    <span class="item-price">00,00 €</span>
                </div>
            </div>

        </div>
    </div>

    <!-- JS -->
    <script src="index.js"></script>
</body>
</html>
